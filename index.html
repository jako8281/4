<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<title>Regnestykker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    font-size: 16pt;   /* lidt mindre igen */
    line-height: 1.45;
    margin: 2cm;
  }
  ul {
    list-style: none;
    padding: 0;
  }
  li {
    margin: 0.5em 0;
  }
  @media print {
    body {
      margin: 1.5cm;
      font-size: 16pt;
    }
  }
</style>
</head>
<body>

<ul id="tasks"></ul>

<script>
/* ---------- DATO SOM FAST ANKER ---------- */
const today = new Date().toISOString().slice(0, 10);

/* Deterministisk pseudo-random generator */
function seededRandom(seed) {
  let h = 2166136261;
  for (let i = 0; i < seed.length; i++) {
    h ^= seed.charCodeAt(i);
    h *= 16777619;
  }
  return function () {
    h += h << 13; h ^= h >>> 7;
    h += h << 3;  h ^= h >>> 17;
    h += h << 5;
    return (h >>> 0) / 4294967296;
  };
}
const rand = seededRandom(today);

/* Decimal med komma */
function dec(min, max) {
  const n = min + rand() * (max - min);
  return n.toFixed(1).replace(".", ",");
}

/* Heltal */
function int(min, max) {
  return Math.floor(min + rand() * (max - min + 1));
}

const tasks = [];

/* ---------- 5 PLUS (1 decimal) ---------- */
for (let i = 0; i < 5; i++) {
  tasks.push(`${dec(1,99)} + ${dec(1,99)} =`);
}

/* ---------- 5 MINUS (1 decimal, positivt) ---------- */
for (let i = 0; i < 5; i++) {
  const a = dec(10,99);
  const b = dec(1, Number(a.replace(",", ".")));
  tasks.push(`${a} - ${b} =`);
}

/* ---------- 5 GANGE (tocifret · tocifret, ingen decimaler) ---------- */
for (let i = 0; i < 5; i++) {
  const a = int(10,99);
  const b = int(10,99);
  tasks.push(`${a} · ${b} =`);
}

/* ---------- 5 DIVISION (trecifret : 2–10, ingen rest) ---------- */
for (let i = 0; i < 5; i++) {
  const divisor = int(2,10);
  const quotient = int(10, 99);
  const dividend = divisor * quotient; // giver altid 3-cifret eller tæt på
  if (dividend >= 100 && dividend <= 999) {
    tasks.push(`${dividend} : ${divisor} =`);
  } else {
    i--; // prøv igen hvis ikke trecifret
  }
}

/* ---------- VIS MED a–t ---------- */
const ul = document.getElementById("tasks");
tasks.forEach((task, index) => {
  const li = document.createElement("li");
  li.textContent = `${String.fromCharCode(97 + index)}) ${task}`;
  ul.appendChild(li);
});
</script>

</body>
</html>
