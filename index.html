<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<title>Regnestykker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    font-size: 18pt;        /* STØRRE TEKST */
    line-height: 1.5;
    margin: 2cm;
  }
  ul {
    list-style-type: none;
    padding: 0;
  }
  li {
    margin: 0.6em 0;
  }
  @media print {
    body {
      margin: 1.5cm;
      font-size: 18pt;
    }
  }
</style>
</head>
<body>

<ul id="tasks"></ul>

<script>
const today = new Date().toISOString().slice(0, 10);

function seededRandom(seed) {
  let h = 2166136261;
  for (let i = 0; i < seed.length; i++) {
    h ^= seed.charCodeAt(i);
    h *= 16777619;
  }
  return function () {
    h += h << 13; h ^= h >>> 7;
    h += h << 3;  h ^= h >>> 17;
    h += h << 5;
    return (h >>> 0) / 4294967296;
  };
}

const rand = seededRandom(today);

function r(min, max, decimals = 1) {
  const n = min + rand() * (max - min);
  return n.toFixed(decimals).replace(".", ",");
}

const tasks = [];

/* 5 PLUS */
for (let i = 0; i < 5; i++) {
  tasks.push(`${r(1,99)} + ${r(1,99)} =`);
}

/* 5 MINUS */
for (let i = 0; i < 5; i++) {
  let a = r(10,99);
  let b = r(1, Number(a.replace(",", ".")));
  tasks.push(`${a} - ${b} =`);
}

/* 5 GANGE */
for (let i = 0; i < 5; i++) {
  tasks.push(`${r(10,99)} · ${r(10,99)} =`);
}

/* 5 DIVISION */
for (let i = 0; i < 5; i++) {
  const divisor = Math.floor(3 + rand() * 8);
  const quotient = Math.floor(2 + rand() * 18);
  tasks.push(`${divisor * quotient} : ${divisor} =`);
}

/* VIS MED a–t */
const ul = document.getElementById("tasks");
tasks.forEach((task, index) => {
  const li = document.createElement("li");
  li.textContent = `${String.fromCharCode(97 + index)}) ${task}`;
  ul.appendChild(li);
});
</script>

</body>
</html>
